apiVersion: batch/v1
kind: Job
metadata:
  name: langgraph-agent
spec:
  template:
    spec:
      containers:
      - name: langgraph
        image: gcr.io/langgraph-gke/langgraph-app:latest
        env:
        - name: MCP_URL
          value: "http://mcp-server-service/mcp"
      restartPolicy: Never
  backoffLimit: 2